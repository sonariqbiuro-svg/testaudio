services:
  - type: web
    name: testaudio
    runtime: python
    buildCommand: |
      apt-get update && apt-get install -y ffmpeg libsndfile1-dev
      pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 600 --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
